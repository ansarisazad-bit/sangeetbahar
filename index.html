<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संगीतबहार (Sangeetbahar) - संगीत सफ़र लाइव</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Yatra+One&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* Top Banner Image Styling */
        .banner-container {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 10px;
            padding: 0 15px;
        }

        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffdf00;
        }

        /* Main Player Card */
        .player-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
            max-width: 450px;
            margin: 20px auto;
            transition: transform 0.3s ease;
        }

        .player-container:hover {
            transform: translateY(-5px);
        }

        .vinyl-disc {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #333 40%, #111 41%, #000 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .vinyl-center {
            width: 35px;
            height: 35px;
            background-color: #ffdf00;
            border-radius: 50%;
        }

        /* Vinyl Rotation */
        .rotate {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .program-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffdf00;
            letter-spacing: 1px;
        }

        /* Audio Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .play-btn {
            background-color: #ffdf00;
            border: none;
            color: #111;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 223, 0, 0.3);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #ffe853;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            color: #94a3b8;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 120px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ffdf00;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 20px;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .status-badge.buffering {
            color: #ff9100;
            background: rgba(255, 145, 0, 0.15);
            border-color: rgba(255, 145, 0, 0.3);
        }

        /* Social Link Button */
        .fb-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #1877f2;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .fb-btn:hover {
            background-color: #166fe5;
        }

        /* Footer */
        footer {
            margin: auto 0 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Banner Section -->
    <div class="banner-container">
        <img src="sangeet safar _2.jpeg" alt="Sangeet Safar Banner" class="banner-img">
    </div>

    <!-- Radio Player Card -->
    <div class="player-container">
        <div class="vinyl-disc" id="disc">
            <div class="vinyl-center"></div>
        </div>
        
        <div class="program-title"><i class="fas fa-broadcast-tower"></i> लाइव प्रसारण प्लेयर</div>
        
        <!-- Native Audio Element -->
        <audio id="radio-player" src="https://stream.zeno.fm/szfmr54krc9uv" preload="none"></audio>

        <!-- Controls -->
        <div class="controls">
            <button class="play-btn" id="play-trigger" onclick="togglePlay()">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
        </div>

        <!-- Volume Control -->
        <div class="volume-container">
            <i class="fas fa-volume-down"></i>
            <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
            <i class="fas fa-volume-up"></i>
        </div>

        <div>
            <a href="https://facebook.com/sangeetbahar" target="_blank" class="fb-btn">
                <i class="fab fa-facebook"></i> फेसबुक पेज पर जुड़ें
            </a>
        </div>

        <div class="status-badge" id="status">सुनने के लिए प्ले बटन दबाएं</div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 संगीतबहार | सर्वाधिकार सुरक्षित</p>
    </footer>

    <!-- Audio Player Logic JavaScript -->
    <script>
        const audio = document.getElementById('radio-player');
        const playBtn = document.getElementById('play-trigger');
        const playIcon = document.getElementById('play-icon');
        const disc = document.getElementById('disc');
        const statusBadge = document.getElementById('status');

        function togglePlay() {
            if (audio.paused) {
                statusBadge.innerText = "कनेक्ट हो रहा है...";
                statusBadge.className = "status-badge buffering";
                
                audio.load(); 
                
                audio.play()
                    .then(() => {
                        playIcon.className = "fas fa-pause";
                        disc.classList.add('rotate');
                        statusBadge.innerText = "● लाइव प्रसारण चालू है";
                        statusBadge.className = "status-badge";
                    })
                    .catch(error => {
                        console.error("Playback failed:", error);
                        statusBadge.innerText = "कनेक्शन में त्रुटि!";
                    });
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                disc.classList.remove('rotate');
                statusBadge.innerText = "प्रसारण रुका हुआ है";
                statusBadge.className = "status-badge buffering";
            }
        }

        function changeVolume(val) {
            audio.volume = val;
        }
    </script>
</body>
</html>
