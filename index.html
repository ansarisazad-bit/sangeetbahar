<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संगीतबहार (Sangeetbahar) - लाइव रेडियो</title>
    <!-- Google Fonts for styling -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Yatra+One&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: space-between;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-top: 30px;
            padding: 10px;
        }

        header h1 {
            font-family: 'Yatra One', cursive;
            font-size: 3rem;
            color: #ffdf00;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-top: 5px;
            font-weight: 300;
        }

        /* Main Player Card */
        .player-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .player-container:hover {
            transform: translateY(-5px);
        }

        .vinyl-disc {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #333 40%, #111 41%, #000 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .vinyl-center {
            width: 40px;
            height: 40px;
            background-color: #ffdf00;
            border-radius: 50%;
        }

        /* Vinyl Rotation Animation */
        .rotate {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .program-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        /* Audio Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .play-btn {
            background-color: #ffdf00;
            border: none;
            color: #111;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 223, 0, 0.4);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #ffe853;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ffdf00;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            background: rgba(0, 230, 118, 0.2);
            color: #00e676;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 15px;
            border: 1px solid rgba(0, 230, 118, 0.4);
        }

        .status-badge.buffering {
            color: #ff9100;
            background: rgba(255, 145, 0, 0.2);
            border-color: rgba(255, 145, 0, 0.4);
        }

        /* Footer Styling */
        footer {
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #d1cff4;
        }

        footer a {
            color: #ffdf00;
            text-decoration: none;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            header h1 { font-size: 2.3rem; }
            .player-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>संगीतबहार</h1>
        <p>सुरों का सफर, यादों के संग...</p>
    </header>

    <!-- Radio Player Card -->
    <div class="player-container">
        <div class="vinyl-disc" id="disc">
            <div class="vinyl-center"></div>
        </div>
        
        <div class="program-title">लाइव स्ट्रीमिंग</div>
        
        <!-- Hidden Native Audio Element -->
        <audio id="radio-player" src="https://stream.zeno.fm/szfmr54krc9uv" preload="none"></audio>

        <!-- Custom Controls -->
        <div class="controls">
            <button class="play-btn" id="play-trigger" onclick="togglePlay()">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
        </div>

        <!-- Volume Control -->
        <div class="volume-container">
            <i class="fas fa-volume-down"></i>
            <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="status-badge" id="status">सुनने के लिए प्ले बटन दबाएं</div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 संगीतबहार रेडियो | सर्वाधिकार सुरक्षित</p>
    </footer>

    <!-- Audio Player Logic JavaScript -->
    <script>
        const audio = document.getElementById('radio-player');
        const playBtn = document.getElementById('play-trigger');
        const playIcon = document.getElementById('play-icon');
        const disc = document.getElementById('disc');
        const statusBadge = document.getElementById('status');

        function togglePlay() {
            if (audio.paused) {
                // Live Stream Fresh Loading Logic
                statusBadge.innerText = "कनेक्ट हो रहा है...";
                statusBadge.className = "status-badge buffering";
                
                // Reload to bypass buffer lag
                audio.load(); 
                
                audio.play()
                    .then(() => {
                        playIcon.className = "fas fa-pause";
                        disc.classList.add('rotate');
                        statusBadge.innerText = "● लाइव प्रसारण चालू है";
                        statusBadge.className = "status-badge";
                    })
                    .catch(error => {
                        console.error("Playback failed:", error);
                        statusBadge.innerText = "कनेक्शन में त्रुटि!";
                    });
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                disc.classList.remove('rotate');
                statusBadge.innerText = "प्रसारण रुका हुआ है";
                statusBadge.className = "status-badge buffering";
            }
        }

        function changeVolume(val) {
            audio.volume = val;
        }
    </script>
</body>
</html>
